<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 경매 둘러보기</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/items.css">
    <link rel="stylesheet" href="/css/modal.css">
    <script src="/js/modal.js"></script>
    <script src="/js/items.js" defer></script>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="items-section">
        <div class="items-container">

            <div class="page-header">
                <h1>경매 둘러보기</h1>
                <p>지금 진행 중인 다양한 경매를 만나보세요</p>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="검색어를 입력하세요">
                    <button type="button" id="searchBtn" class="btn-search">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>

                <div class="toolbar-actions">
                    <select id="categoryFilter" class="filter-select">
                        <option value="all">전체 카테고리</option>
                        <option value="digital">디지털/가전</option>
                        <option value="computer">컴퓨터/주변기기</option>
                        <option value="fashion">패션의류/잡화</option>
                        <option value="beauty">뷰티/미용</option>
                        <option value="furniture">가구/인테리어</option>
                        <option value="living">주방/생활용품</option>
                        <option value="sports">스포츠/레저</option>
                        <option value="books">도서/티켓/굿즈</option>
                        <option value="collectibles">컬렉터블/수집품</option>
                        <option value="hobby">악기/취미</option>
                        <option value="vehicle">차량/오토바이 용품</option>
                        <option value="etc">기타/반려동물</option>
                    </select>

                    <select id="sortSelect" class="filter-select">
                        <option value="recent">최신순</option>
                        <option value="ending">마감임박순</option>
                        <option value="price-low">낮은 가격순</option>
                        <option value="price-high">높은 가격순</option>
                    </select>
                </div>
            </div>

            <div class="status-tabs" th:if="${items != null && !items.isEmpty()}">
                <button class="status-tab" data-status="all">전체 <span class="count" th:text="${items.size()}">0</span></button>
                <button class="status-tab active" data-status="bidding">진행 중 <span class="count" th:text="${items.?[status == 'bidding'].size()}">0</span></button>
                <button class="status-tab" data-status="upcoming">시작 예정 <span class="count" th:text="${items.?[status == 'upcoming'].size()}">0</span></button>
                <button class="status-tab" data-status="ended">종료 <span class="count" th:text="${items.?[status == 'ended'].size()}">0</span></button>
            </div>

            <div class="card-grid" id="cardGrid" th:if="${items != null && !items.isEmpty()}">

                <div class="item-card"
                     th:each="item : ${items}"
                     th:attr="data-category=${item.category}, data-status=${item.status}, data-price=${item.startPrice}, data-time=${item.status == 'upcoming'} ? ${item.startTime} : ${item.endTime}, data-item-id=${item.id}">
                    <div class="card-thumb">
                        <span class="status-badge" th:classappend="${item.status}"
                              th:text="${item.status == 'bidding'} ? 'LIVE' : (${item.status == 'upcoming'} ? 'UPCOMING' : 'ENDED')">LIVE</span>
                        <button class="btn-pick" th:classappend="${favoriteItemIds.contains(item.id)} ? 'active'"
                                th:attr="data-item-id=${item.id}" title="찜하기">
                            <svg class="star-icon" viewBox="0 0 24 24" width="20" height="20">
                                <path class="star-path" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                        </button>
                        <a th:href="'/sellers/' + ${item.sellerId}" class="seller-badge" th:text="${sellerNicknames[item.sellerId]}">판매자</a>
                        <div th:if="${item.imagePaths != null && !item.imagePaths.isEmpty()}" class="card-image">
                            <img th:src="${item.imagePaths.split(',')[0].startsWith('/') ? item.imagePaths.split(',')[0] : '/' + item.imagePaths.split(',')[0]}" th:alt="${item.title}">
                        </div>
                        <div th:unless="${item.imagePaths != null && !item.imagePaths.isEmpty()}" class="dummy-img">📦</div>
                    </div>
                    <div class="card-body">
                        <h3>
                            <a th:href="'/items/' + ${item.id}" 
                               th:text="${item.title}" style="color: inherit; text-decoration: none;">경매 제목</a>
                        </h3>
                        <div class="price-info">
                            <div class="price-box">
                                <span class="label" th:text="${item.status == 'bidding'} ? '현재 최고가' : (${item.status == 'upcoming'} ? '시작가' : '최종 낙찰가')">현재 최고가</span>
                                <span class="price" th:text="${#numbers.formatInteger(item.currentPrice != null ? item.currentPrice : item.startPrice, 3, 'COMMA')} + '원'">0원</span>
                            </div>
                            <div class="time-box">
                                <span class="label" th:text="${item.status == 'bidding'} ? '남은 시간' : (${item.status == 'upcoming'} ? '시작까지' : '상태')">남은 시간</span>
                                <span class="time-countdown" th:if="${item.status != 'ended'}"
                                      th:attr="data-time=${item.status == 'upcoming'} ? ${item.startTime} : ${item.endTime}"
                                      th:text="${item.status == 'upcoming'} ? ${item.startTime} : ${item.endTime}">00:00:00</span>
                                <span class="time-countdown ended" th:if="${item.status == 'ended'}">경매 종료</span>
                            </div>
                        </div>
                        <div class="card-meta">
                            <span class="category-tag" th:text="${categoryNames[item.category]}">카테고리</span>
                            <span class="bidder-count-tag" th:text="'입찰 ' + ${bidderCounts[item.id]} + '명'">입찰 0명</span>
                            <span class="meta-tag" th:classappend="${item.status == 'upcoming'} ? 'upcoming-tag' : (${item.status == 'ended'} ? 'ended-tag' : '')"
                                  th:text="${item.status == 'upcoming'} ? '시작 예정' : (${item.status == 'ended'} ? '종료' : '진행 중')">진행 중</span>
                        </div>
                    </div>
                </div>

            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">🔍</div>
                <h3>검색 결과가 없습니다</h3>
                <p>다른 검색어나 필터를 시도해보세요</p>
            </div>

            <div class="empty-state" th:if="${items == null || items.isEmpty()}">
                <div class="empty-icon">📦</div>
                <h3>아직 등록된 경매가 없습니다</h3>
                <p>첫 번째 경매 물품을 등록해보세요!</p>
                <a th:href="${isLoggedIn} ? '/account/items/new' : '/login?redirect=/account/items/new'" class="btn-register">경매 등록하기</a>
            </div>

        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
