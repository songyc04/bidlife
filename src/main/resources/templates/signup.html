<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | нҡҢмӣҗк°Җмһ…</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/signup.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">BID<span>LIFE</span></a>
            <nav class="nav-menu">
                <a href="/items" class="nav-link">кІҪл§Ө л‘ҳлҹ¬ліҙкё°</a>
                <a href="/items/new" class="nav-link btn-create">кІҪл§Ө л“ұлЎқ</a>
            </nav>
            <div class="nav-auth">
                <a href="/login" class="btn-login">лЎңк·ёмқё</a>
                <a href="/signup" class="btn-signup">нҡҢмӣҗк°Җмһ…</a>
            </div>
        </div>
    </header>

    <main class="signup-section">
        <div class="signup-container">
            <div class="signup-header">
                <h1>нҡҢмӣҗк°Җмһ…</h1>
                <p>BIDLIFEмҷҖ н•Ёк»ҳ кІҪл§Өмқҳ м„ёкі„м—җ лӣ°м–ҙл“ңм„ёмҡ”</p>
            </div>

            <div class="signup-form">
                <div class="step-indicator">
                    <span class="step active">1</span>
                    <span class="step-line"></span>
                    <span class="step">2</span>
                </div>

                <div class="input-group">
                    <label for="email">мқҙл©”мқј</label>
                    <div class="input-with-btn">
                        <input type="email" id="email" placeholder="мқҙл©”мқјмқ„ мһ…л Ҙн•ҳм„ёмҡ”" required>
                        <button type="button" id="sendCodeBtn" class="btn-code">мқёмҰқлІҲнҳё л°ңмҶЎ</button>
                    </div>
                </div>

                <div class="input-group" id="codeGroup" style="display: none;">
                    <label for="code">мқёмҰқлІҲнҳё</label>
                    <div class="input-with-btn">
                        <input type="text" id="code" placeholder="6мһҗлҰ¬ мқёмҰқлІҲнҳё" maxlength="6">
                        <button type="button" id="verifyCodeBtn" class="btn-code">нҷ•мқё</button>
                    </div>
                    <span class="timer" id="timer"></span>
                </div>

                <div class="signup-footer">
                    <p>мқҙлҜё кі„м •мқҙ мһҲмңјмӢ к°Җмҡ”? <a href="/login">лЎңк·ёмқё</a></p>
                </div>
            </div>
        </div>

        <div class="glow-sphere"></div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 BIDLIFE. All rights reserved. нҸҙлҰ¬н…Қ кё°л§җ кіјм ң н”„лЎңм қнҠё</p>
    </footer>

    <script>
        let timerInterval;
        let timeLeft = 300;

        document.getElementById('sendCodeBtn').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                alert('мқҙл©”мқјмқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('мҳ¬л°”лҘё мқҙл©”мқј нҳ•мӢқмқҙ м•„лӢҷлӢҲлӢӨ.');
                return;
            }

            fetch('/signup/send-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email)
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'SUCCESS') {
                    alert('мқёмҰқлІҲнҳёк°Җ л°ңмҶЎлҗҳм—ҲмҠөлӢҲлӢӨ.');
                    document.getElementById('codeGroup').style.display = 'block';
                    startTimer();
                } else {
                    alert(data);
                }
            });
        });

        document.getElementById('verifyCodeBtn').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;

            if (!code) {
                alert('мқёмҰқлІҲнҳёлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.');
                return;
            }

            fetch('/signup/verify-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email) + '&code=' + encodeURIComponent(code)
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'SUCCESS') {
                    alert('мқҙл©”мқј мқёмҰқмқҙ мҷ„лЈҢлҗҳм—ҲмҠөлӢҲлӢӨ.');
                    clearInterval(timerInterval);
                    window.location.href = '/signup/register';
                } else {
                    alert(data);
                }
            });
        });

        function startTimer() {
            timeLeft = 300;
            clearInterval(timerInterval);
            
            timerInterval = setInterval(function() {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').textContent = 'л§ҢлЈҢлҗЁ';
                }
                timeLeft--;
            }, 1000);
        }
    </script>
</body>
</html>
