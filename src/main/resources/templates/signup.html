<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/signup.css">
    <link rel="stylesheet" href="/css/modal.css">
    <script src="/js/modal.js"></script>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">BID<span>LIFE</span></a>
            <nav class="nav-menu">
                <a href="/items" class="nav-link">경매 둘러보기</a>
                <a href="/account/items/new" class="nav-link btn-create">경매 등록</a>
            </nav>
            <div class="nav-auth">
                <a href="/login" class="btn-login">로그인</a>
                <a href="/signup" class="btn-signup">회원가입</a>
            </div>
        </div>
    </header>

    <main class="signup-section">
        <div class="signup-container">
            <div class="signup-header">
                <h1>회원가입</h1>
                <p>BIDLIFE와 함께 경매의 세계에 뛰어드세요</p>
            </div>

            <div class="signup-form">
                <div class="step-indicator">
                    <span class="step active">1</span>
                    <span class="step-line"></span>
                    <span class="step">2</span>
                </div>

                <div class="input-group">
                    <label for="email">이메일</label>
                    <div class="input-with-btn">
                        <input type="email" id="email" placeholder="gmail.com 또는 naver.com 으로만 가입할 수 있어요" required>
                        <button type="button" id="sendCodeBtn" class="btn-code">인증번호 발송</button>
                    </div>
                    <span class="hint">다른 메일 계정 회원가입 기능은 준비 중이예요</span>
                </div>

                <div class="input-group" id="codeGroup" style="display: none;">
                    <label for="code">인증번호</label>
                    <div class="input-with-btn">
                        <input type="text" id="code" placeholder="5자리 인증번호" maxlength="5">
                        <button type="button" id="verifyCodeBtn" class="btn-code">확인</button>
                    </div>
                    <span class="timer" id="timer"></span>
                </div>

                <div class="signup-footer">
                    <p>이미 계정이 있으신가요? <a href="/login">로그인</a></p>
                </div>
            </div>
        </div>

        <div class="glow-sphere"></div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 BIDLIFE. All rights reserved. 폴리텍 기말 과제 프로젝트</p>
    </footer>

    <script>
        let timerInterval;
        let timeLeft = 300;

        document.getElementById('sendCodeBtn').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                showAlert('이메일을 입력해주세요.', '📧');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('올바른 이메일 형식이 아닙니다.', '📧');
                return;
            }

            // 도메인 검증
            const domain = email.split('@')[1];
            if (domain !== 'gmail.com' && domain !== 'naver.com' && domain !== 'test.com') {
                showAlert('gmail.com, naver.com, test.com 이메일만 가입 가능합니다.', '📧');
                return;
            }

            fetch('/signup/send-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email)
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'SUCCESS') {
                    showAlert('인증번호가 발송되었습니다. 이메일을 확인해주세요.', '✉️');
                    document.getElementById('codeGroup').style.display = 'block';
                    startTimer();
                } else if (data.startsWith('TEST_CODE:')) {
                    // 테스트 모드: 인증번호 자동 입력
                    const testCode = data.substring(10);
                    showAlert('테스트 모드 - 인증번호: ' + testCode, '🧪');
                    document.getElementById('code').value = testCode;
                    document.getElementById('codeGroup').style.display = 'block';
                    startTimer();
                } else {
                    showAlert(data, '❌');
                }
            });
        });

        document.getElementById('verifyCodeBtn').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;

            if (!code) {
                showAlert('인증번호를 입력해주세요.', '🔢');
                return;
            }

            fetch('/signup/verify-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email) + '&code=' + encodeURIComponent(code)
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'SUCCESS') {
                    showSuccess('이메일 인증이 완료되었습니다.', '✅');
                    clearInterval(timerInterval);
                    setTimeout(() => {
                        window.location.href = '/signup/register';
                    }, 1500);
                } else {
                    showAlert(data, '❌');
                }
            });
        });

        function startTimer() {
            timeLeft = 300;
            clearInterval(timerInterval);
            
            timerInterval = setInterval(function() {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').textContent = '만료됨';
                }
                timeLeft--;
            }, 1000);
        }
    </script>
</body>
</html>
