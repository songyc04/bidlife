<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <script src="/js/login.js" defer></script>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">BID<span>LIFE</span></a>
            <nav class="nav-menu">
                <a href="/items" class="nav-link">경매 둘러보기</a>
                <a href="/items/new" class="nav-link btn-create">경매 등록</a>
            </nav>
            <div class="nav-auth">
                <a href="/login" class="btn-login">로그인</a>
                <a href="/signup" class="btn-signup">회원가입</a>
            </div>
        </div>
    </header>

    <main class="login-section">
        <div class="login-container">
            <div class="login-header">
                <h1>로그인</h1>
                <p>BIDLIFE의 모든 경매에 참여하세요</p>
            </div>

            <form class="login-form" action="/login" method="post">
                <input type="hidden" name="redirect" th:value="${redirect}">
                <div class="error-message" th:if="${error}" th:text="${error}"></div>

                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>로그인 상태 유지</span>
                    </label>
                    <a href="#" class="forgot-link">비밀번호 찾기</a>
                </div>

                <button type="submit" class="btn-submit">로그인</button>

                <div class="login-footer">
                    <p>아직 계정이 없으신가요? <a href="/signup">회원가입</a></p>
                </div>
            </form>
        </div>

        <div class="glow-sphere"></div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 BIDLIFE. All rights reserved. 폴리텍 기말 과제 프로젝트</p>
    </footer>

</body>
</html>
