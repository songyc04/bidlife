<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 마이페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/account.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/modal.css">
    <script src="/js/modal.js"></script>
    <script src="/js/account.js" defer></script>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="account-section">
        <div class="account-container">
            
            <div th:replace="~{fragments/account-sidebar :: accountSidebar('info')}"></div>

            <section class="account-content">
                <div class="content-header">
                    <h2>내 정보</h2>
                    <p>계정 정보를 확인하고 관리하세요</p>
                </div>

                <div class="alert-success" th:if="${successMessage != null}" th:text="${successMessage}">
                    성공적으로 변경되었습니다.
                </div>

                <div class="alert-error" th:if="${errorMessage != null}" th:text="${errorMessage}">
                    오류가 발생했습니다.
                </div>

                <div class="info-card">
                    <h3 class="info-card-title">기본 정보</h3>
                    <div class="info-row">
                        <label>이메일</label>
                        <span class="info-value" th:text="${email}">email@example.com</span>
                    </div>
                    <div class="info-row">
                        <label>닉네임</label>
                        <span class="info-value" th:text="${nickname}">닉네임</span>
                    </div>
                    <div class="btn-edit-wrapper">
                        <button type="button" class="btn-edit" id="btnToggleEdit">정보 수정</button>
                    </div>
                </div>

                <div class="edit-section" id="editSection"
                     th:classappend="${errorMessage != null or successMessage != null or passwordErrorMessage != null or passwordSuccessMessage != null} ? ' active'">
                    <div class="info-card">
                        <h3 class="info-card-title">프로필 이미지</h3>
                        <form action="/account/update-profile-image" method="post" enctype="multipart/form-data" class="edit-form">
                            <div class="profile-upload-area" id="profileUploadArea">
                                <div class="profile-preview" id="profilePreview">
                                    <img th:if="${profileImage != null and !profileImage.isEmpty()}" 
                                         th:src="${profileImage}" 
                                         alt="프로필" 
                                         class="preview-img">
                                    <span th:if="${profileImage == null or profileImage.isEmpty()}" 
                                          class="preview-placeholder">이미지 없음</span>
                                </div>
                                <div class="upload-controls">
                                    <input type="file" id="profileImageInput" name="profileImage" 
                                           accept="image/*" style="display:none">
                                    <button type="button" class="btn-upload-select" id="btnSelectImage">이미지 선택</button>
                                    <p class="upload-hint">JPG, PNG, GIF 형식 (최대 5MB 권장)</p>
                                </div>
                            </div>
                            <button type="submit" class="btn-edit" id="btnUploadProfile" disabled>프로필 이미지 변경</button>
                        </form>
                    </div>

                    <div class="info-card">
                        <h3 class="info-card-title">닉네임 변경</h3>
                        <form action="/account/update-nickname" method="post" class="edit-form">
                            <div class="form-group">
                                <label for="newNickname">새 닉네임</label>
                                <input type="text" id="newNickname" name="newNickname" 
                                       th:value="${nickname}" required maxlength="50"
                                       placeholder="새 닉네임을 입력하세요">
                            </div>
                            <button type="submit" class="btn-edit">닉네임 변경</button>
                        </form>
                    </div>

                    <div class="info-card">
                        <h3 class="info-card-title">비밀번호 변경</h3>
                        <div class="alert-error" th:if="${passwordErrorMessage != null}" th:text="${passwordErrorMessage}">
                            오류가 발생했습니다.
                        </div>
                        <div class="alert-success" th:if="${passwordSuccessMessage != null}" th:text="${passwordSuccessMessage}">
                            성공적으로 변경되었습니다.
                        </div>
                        <form action="/account/update-password" method="post" class="edit-form" id="passwordForm">
                            <div class="form-group">
                                <label for="currentPassword">현재 비밀번호</label>
                                <input type="password" id="currentPassword" name="currentPassword" 
                                       required placeholder="현재 비밀번호를 입력하세요">
                            </div>
                            <div class="form-group">
                                <label for="newPassword">새 비밀번호</label>
                                <input type="password" id="newPassword" name="newPassword" 
                                       required minlength="6" placeholder="6자 이상 입력하세요">
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">새 비밀번호 확인</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" 
                                       required minlength="6" placeholder="새 비밀번호를 다시 입력하세요">
                            </div>
                            <button type="submit" class="btn-edit">비밀번호 변경</button>
                        </form>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
