<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 마이페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/account.css">
    <script src="/js/account.js" defer></script>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">BID<span>LIFE</span></a>
            <nav class="nav-menu">
                <a href="/items" class="nav-link">경매 둘러보기</a>
                <a href="/account/items/new" class="nav-link btn-create">경매 등록</a>
            </nav>
            <div class="nav-auth">
                <a href="/account" class="btn-mypage">마이페이지</a>
                <a href="/login/logout" class="btn-logout">로그아웃</a>
            </div>
        </div>
    </header>

    <main class="account-section">
        <div class="account-container">
            
            <aside class="account-sidebar">
                <div class="sidebar-header">
                    <div class="profile-icon">
                        <span th:text="${nickname != null ? nickname.substring(0,1) : '?'}">U</span>
                    </div>
                    <h3 th:text="${nickname}">닉네임</h3>
                </div>
                <nav class="sidebar-menu">
                    <a href="/account" class="menu-item active">
                        <span class="menu-icon">👤</span>
                        <span>내 정보</span>
                    </a>
                    <a href="/account/bids" class="menu-item">
                        <span class="menu-icon">💰</span>
                        <span>내 입찰 내역</span>
                    </a>
                    <a href="/account/items" class="menu-item">
                        <span class="menu-icon">📦</span>
                        <span>등록한 경매</span>
                    </a>
                    <a href="/account/picklist" class="menu-item">
                        <span class="menu-icon">⭐</span>
                        <span>찜한 경매</span>
                    </a>
                </nav>
            </aside>

            <section class="account-content">
                <div class="content-header">
                    <h2>내 정보</h2>
                    <p>계정 정보를 확인하고 관리하세요</p>
                </div>

                <div class="info-card">
                    <div class="info-row">
                        <label>이메일</label>
                        <span class="info-value" th:text="${email}">email@example.com</span>
                    </div>
                    <div class="info-row">
                        <label>닉네임</label>
                        <span class="info-value" th:text="${nickname}">닉네임</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-edit" id="editProfileBtn">프로필 수정</button>
                    <a href="/login/logout" class="btn-logout-main">로그아웃</a>
                </div>
            </section>

        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 BIDLIFE. All rights reserved. 폴리텍 기말 과제 프로젝트</p>
    </footer>

</body>
</html>
