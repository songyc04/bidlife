<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 공지사항</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/notice-list.css">
    <link rel="stylesheet" href="/css/responsive.css">

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="notice-section">
    <h1 class="page-title">📢 공지사항</h1>
    <p class="page-desc">BIDLIFE의 새로운 소식과 중요한 안내를 확인하세요.</p>

    <div class="notice-list" th:if="${notices != null and !notices.isEmpty()}">
        <a th:each="notice : ${notices}"
           th:href="'/notices/' + ${notice.id}"
           class="notice-item"
           th:classappend="${notice.isImportant} ? 'important'">
            <span class="notice-badge" th:if="${notice.isImportant}">중요</span>
            <span class="notice-title" th:text="${notice.title}">공지 제목</span>
            <div class="notice-meta">
                <span th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}">2026.01.01</span>
                <span class="views" th:text="${notice.viewCount}">0</span>
            </div>
        </a>
    </div>

    <div class="empty-state" th:if="${notices == null or notices.isEmpty()}">
        <div class="empty-state-icon">📭</div>
        <h3>등록된 공지사항이 없습니다</h3>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
