<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${notice.title}">공지사항</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/notice-detail.css">
    <link rel="stylesheet" href="/css/responsive.css">

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="notice-detail-section">
    <div class="detail-layout">
        <article class="notice-content">
            <div class="notice-header">
                <h1 class="notice-title">
                    <span class="important-badge" th:if="${notice.isImportant}">중요</span>
                    <span th:text="${notice.title}">공지 제목</span>
                </h1>
                <div class="notice-meta">
                    <span>작성자: <strong th:text="${notice.author}">관리자</strong></span>
                    <span th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd HH:mm')}">2026.01.01 12:00</span>
                    <span>조회수: <strong th:text="${notice.viewCount}">0</strong></span>
                </div>
            </div>
            <div class="notice-body" th:text="${notice.content}">공지 내용</div>
            <a href="/notices" class="back-link">← 목록으로</a>
        </article>

        <aside class="sidebar-card" th:if="${recentNotices != null}">
            <h3>최근 공지</h3>
            <div class="recent-list">
                <a th:each="recent : ${recentNotices}"
                   th:href="'/notices/' + ${recent.id}"
                   class="recent-item"
                   th:text="${recent.title}">최근 공지</a>
            </div>
        </aside>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
