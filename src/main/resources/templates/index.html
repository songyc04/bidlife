<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 한계 없는 실시간 경매</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/items.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/index.css">
    <script src="/js/index.js" defer></script>
    <script src="/js/items.js" defer></script>
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <section class="hero-section">
        <div class="hero-content">
            <span class="badge">LIVE AUCTION PLATFORM</span>
            <h1>가장 뜨거운 경매,<br>멈추지 않는 <span>LIFE</span></h1>
            <p>지금 이 순간에도 가치는 상승하고 있습니다. <br>전 세계 트렌드 세터들과 함께 짜릿한 비딩에 참여하세요.</p>
            <div class="hero-btns">
                <a href="/items" class="btn-primary">지금 비딩 참여하기</a>
                <a th:href="${isLoggedIn} ? '/account/items/new' : '/login?redirect=/account/items/new'" class="btn-secondary">내 물품 출품하기</a>
            </div>
        </div>
        <div class="hero-visual">
            <div class="glow-sphere"></div>
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-info">
                        <div class="stat-number" th:text="${#numbers.formatInteger(totalMembers, 1, 'COMMA')}">0</div>
                        <div class="stat-label">회원 수</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-info">
                        <div class="stat-number" th:text="${#numbers.formatInteger(totalItems, 1, 'COMMA')}">0</div>
                        <div class="stat-label">등록된 경매</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-info">
                        <div class="stat-number" th:text="${#numbers.formatInteger(activeAuctions, 1, 'COMMA')}">0</div>
                        <div class="stat-label">진행 중인 경매</div>
                    </div>
                </div>
                <div class="stat-card highlight">
                    <div class="stat-icon">💰</div>
                    <div class="stat-info">
                        <div class="stat-number" th:text="${#numbers.formatInteger(highestBid, 1, 'COMMA')} + '원'">0원</div>
                        <div class="stat-label">최고가 낙찰</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="live-preview-section" th:if="${hotItems != null && !hotItems.isEmpty()}">
        <div class="section-header">
            <h2>🔥 HOT BIDDING NOW</h2>
            <a href="/items" class="view-all">전체 상품 보기 &rarr;</a>
        </div>
        
        <div class="card-grid">
            <div class="item-card" th:each="item : ${hotItems}"
                 th:attr="data-category=${item.category}, data-status=${item.status}, data-price=${item.startPrice}, data-time=${item.endTime}, data-item-id=${item.id}">
                <div class="card-thumb">
                    <span class="status-badge bidding">LIVE</span>
                    <button class="btn-pick" th:classappend="${favoriteItemIds.contains(item.id)} ? 'active'"
                            th:attr="data-item-id=${item.id}" title="찜하기">
                        <svg class="star-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path class="star-path" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                    </button>
                    <a th:href="'/sellers/' + ${item.sellerId}" class="seller-badge" th:text="${sellerNicknames[item.sellerId]}">판매자</a>
                    <div th:if="${item.imagePaths != null && !item.imagePaths.isEmpty()}" class="card-image">
                        <img th:src="${item.imagePaths.split(',')[0].startsWith('/') ? item.imagePaths.split(',')[0] : '/' + item.imagePaths.split(',')[0]}" th:alt="${item.title}">
                    </div>
                    <div th:unless="${item.imagePaths != null && !item.imagePaths.isEmpty()}" class="dummy-img">📦</div>
                </div>
                <div class="card-body">
                    <h3>
                        <a th:href="'/items/' + ${item.id}" 
                           th:text="${item.title}" style="color: inherit; text-decoration: none;">경매 제목</a>
                    </h3>
                    <div class="price-info">
                        <div class="price-box">
                            <span class="label">현재 최고가</span>
                            <span class="price" th:text="${#numbers.formatInteger(item.currentPrice != null ? item.currentPrice : item.startPrice, 3, 'COMMA')} + '원'">0원</span>
                        </div>
                        <div class="time-box">
                            <span class="label">남은 시간</span>
                            <span class="time-countdown" th:attr="data-time=${item.endTime}"
                                  th:text="${item.endTime}">00:00:00</span>
                        </div>
                    </div>
                    <div class="card-meta">
                        <span class="category-tag" th:text="${categoryNames[item.category]}">카테고리</span>
                        <span class="bidder-count-tag" th:text="'입찰 ' + ${bidderCounts[item.id]} + '명'">입찰 0명</span>
                        <span class="meta-tag">진행 중</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
