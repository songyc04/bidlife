<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 회원가입 완료</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/join_complete.css">
    <script src="/js/join_complete.js" defer></script>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">BID<span>LIFE</span></a>
            <nav class="nav-menu">
                <a href="/items" class="nav-link">경매 둘러보기</a>
                <a href="/items/new" class="nav-link btn-create">경매 등록</a>
            </nav>
            <div class="nav-auth">
                <a href="/login" class="btn-login">로그인</a>
                <a href="/signup" class="btn-signup">회원가입</a>
            </div>
        </div>
    </header>

    <main class="complete-section">
        <div class="complete-container">
            <div class="complete-header">
                <div class="success-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h1>회원가입 완료</h1>
                <p>BIDLIFE 회원이 되신 것을 환영합니다!</p>
            </div>

            <div class="button-group">
                <a href="/login" class="btn-primary">로그인하기</a>
                <a href="/" class="btn-secondary">홈으로 이동</a>
            </div>
        </div>

        <div class="glow-sphere"></div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 BIDLIFE. All rights reserved. 폴리텍 기말 과제 프로젝트</p>
    </footer>

</body>
</html>
