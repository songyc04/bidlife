<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 비밀번호 찾기</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/modal.css">
    <script src="/js/modal.js"></script>
    <link rel="stylesheet" href="/css/responsive.css">`n</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="login-section">
        <div class="login-container">
            <div class="login-header">
                <h1>비밀번호 찾기</h1>
                <p>가입한 이메일을 입력해주세요</p>
            </div>

            <form class="login-form" action="/login/find-password" method="post">
                <div class="error-message" th:if="${error}" th:text="${error}"></div>
                <div class="success-message" th:if="${success}" th:text="${success}"></div>

                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="가입한 이메일을 입력하세요" required>
                </div>

                <button type="submit" class="btn-submit">임시 비밀번호 발급</button>

                <div class="login-footer">
                    <p><a href="/login">로그인으로 돌아가기</a></p>
                </div>
            </form>
        </div>

        <div class="glow-sphere"></div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script th:if="${isTestMode}">
        // 테스트 모드: 임시 비밀번호를 팝업으로 표시
        window.addEventListener('DOMContentLoaded', function() {
            const tempPassword = '[[${tempPassword}]]';
            showModal({
                type: 'success',
                icon: '🔑',
                title: '임시 비밀번호 발급',
                message: '테스트 모드입니다.<br><br>임시 비밀번호: <strong style="font-size: 18px; color: #ff5a00;">' + tempPassword + '</strong><br><br>이 비밀번호로 로그인한 후 반드시 비밀번호를 변경해주세요.',
                onConfirm: function() {
                    window.location.href = '/login';
                },
                confirmText: '로그인하러 가기'
            });
        });
    </script>

</body>
</html>
