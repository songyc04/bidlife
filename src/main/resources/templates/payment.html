<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 결제</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/account.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/transactions.css">
    <link rel="stylesheet" href="/css/modal.css">
    <script src="/js/modal.js"></script>
    
    <link rel="stylesheet" href="/css/responsive.css">`n    <link rel="stylesheet" href="/css/payment.css">

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="account-section">
    <div class="payment-container">

        <div class="content-header">
            <h2>결제하기 <span class="test-mode-badge" th:if="${@environment.getProperty('toss.test-mode') == 'true'}">TEST MODE</span></h2>
            <p>낙찰/구매가 확정되었습니다. 결제를 진행해주세요.</p>
        </div>

        <div class="alert-success" th:if="${successMessage != null}" th:text="${successMessage}">성공</div>
        <div class="alert-error" th:if="${errorMessage != null}" th:text="${errorMessage}">오류</div>

        <div class="payment-card">
            <h3>주문 정보</h3>
            <div class="payment-row">
                <span class="label">상품명</span>
                <span class="value" th:text="${item.title}">-</span>
            </div>
            <div class="payment-row">
                <span class="label">판매자</span>
                <span class="value" th:text="${sellerNickname}">-</span>
            </div>
            <div class="payment-row">
                <span class="label">주문 번호</span>
                <span class="value" th:text="${item.orderId != null ? item.orderId : '아직 생성되지 않음'}">-</span>
            </div>
            <div class="payment-amount" th:text="${#numbers.formatInteger(item.finalPrice, 3, 'COMMA')} + '원'">0원</div>
        </div>

        <div class="payment-card">
            <h3>결제 수단 선택</h3>

            <form th:action="'/payment/' + ${item.id} + '/request'" method="post" style="margin-bottom: 12px;">
                <button type="submit" class="btn-toss-pay">💳 토스페이먼츠로 결제하기</button>
            </form>

            <form th:action="'/payment/' + ${item.id} + '/test-pay'" method="post" id="testPayForm">
                <button type="submit" class="btn-test-pay">🧪 테스트 결제 (개발용, 실제 결제 X)</button>
            </form>

            <div class="info-box" style="margin-top: 20px;">
                <strong>ℹ️ 안내</strong><br>
                • <strong>토스페이먼츠</strong>: 실제 토스 결제창으로 이동하여 테스트 카드로 결제<br>
                &nbsp;&nbsp;(테스트 카드: 4000-0000-0000-0000 / 유효기간: 미래 / CVC: 아무 숫자)<br>
                • <strong>테스트 결제</strong>: 토스 API 호출 없이 결제 완료 처리 (개발/테스트용)
            </div>
        </div>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    document.getElementById('testPayForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const form = this;
        const itemTitle = /*[[${item.title}]]*/ '';
        const formattedPrice = /*[[${#numbers.formatInteger(item.finalPrice, 3, 'COMMA')}]]*/ '0';
        const sellerNickname = /*[[${sellerNickname}]]*/ '';

        const message = `🧪 테스트 결제를 진행하시겠습니까?<br><br>` +
                      `<div style="text-align: left; padding: 16px; background: #181818; border-radius: 6px; margin: 12px 0;">` +
                      `<div style="display: flex; justify-content: space-between; padding: 4px 0;"><span style="color: #888;">상품명</span><span style="color: #fff; font-weight: 700;">${itemTitle}</span></div>` +
                      `<div style="display: flex; justify-content: space-between; padding: 4px 0;"><span style="color: #888;">판매자</span><span style="color: #fff; font-weight: 700;">${sellerNickname}</span></div>` +
                      `<div style="display: flex; justify-content: space-between; padding: 8px 0 0; border-top: 1px solid #333; margin-top: 8px;"><span style="color: #888;">결제 금액</span><span style="color: #ff5a00; font-weight: 900; font-size: 18px;">${formattedPrice}원</span></div>` +
                      `<div style="display: flex; justify-content: space-between; padding: 4px 0;"><span style="color: #888;">결제 수단</span><span style="color: #fff; font-weight: 700;">테스트 (개발용)</span></div>` +
                      `</div>` +
                      `<span style="color: #ffc107; font-size: 13px;">⚠️ 실제 결제가 발생하지 않으며, 판매자에게 입금 확인 요청 알림이 전송됩니다.</span>`;

        showConfirm(message, function() {
            form.submit();
        });
    });
    /*]]>*/
</script>

</body>
</html>
