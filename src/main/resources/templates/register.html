<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/signup.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/modal.css">
    <script src="/js/modal.js"></script>
    <link rel="stylesheet" href="/css/responsive.css">`n</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="signup-section">
        <div class="signup-container">
            <div class="signup-header">
                <h1>회원가입</h1>
                <p>BIDLIFE와 함께 경매의 세계에 뛰어드세요</p>
            </div>

            <form class="signup-form" action="/signup/register" method="post">
                <div class="step-indicator">
                    <span class="step completed">1</span>
                    <span class="step-line completed"></span>
                    <span class="step active">2</span>
                </div>

                <div class="error-message" th:if="${error}" th:text="${error}"></div>

                <input type="hidden" name="email" th:value="${email}">

                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" th:value="${email}" readonly class="verified-email">
                    <span class="verified-badge">인증 완료</span>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="input-group">
                    <label for="password-confirm">비밀번호 확인</label>
                    <input type="password" id="password-confirm" placeholder="비밀번호를 다시 입력하세요" required>
                </div>

                <div class="input-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" name="nickname" placeholder="닉네임을 입력하세요" required>
                </div>

                <button type="submit" class="btn-submit">가입하기</button>

                <div class="signup-footer">
                    <p>이미 계정이 있으신가요? <a href="/login">로그인</a></p>
                </div>
            </form>
        </div>

        <div class="glow-sphere"></div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        document.querySelector('.signup-form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;

            if (password !== passwordConfirm) {
                e.preventDefault();
                showAlert('비밀번호가 일치하지 않습니다.', '🔒');
            }
        });
    </script>
</body>
</html>
