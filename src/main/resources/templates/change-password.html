<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 비밀번호 변경</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/modal.css">
    <script src="/js/modal.js"></script>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="login-section">
        <div class="login-container">
            <div class="login-header">
                <h1>비밀번호 변경</h1>
                <p>임시 비밀번호로 로그인하셨습니다.<br>새로운 비밀번호를 설정해주세요.</p>
            </div>

            <form class="login-form" action="/login/change-password" method="post">
                <div class="error-message" th:if="${error}" th:text="${error}"></div>

                <div class="input-group">
                    <label for="newPassword">새 비밀번호</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="새 비밀번호 (6자 이상)" required minlength="6">
                </div>

                <div class="input-group">
                    <label for="confirmPassword">새 비밀번호 확인</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="새 비밀번호 확인" required minlength="6">
                </div>

                <button type="submit" class="btn-submit">비밀번호 변경</button>
            </form>
        </div>

        <div class="glow-sphere"></div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        document.querySelector('.login-form').addEventListener('submit', function(e) {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                e.preventDefault();
                showAlert('비밀번호가 일치하지 않습니다.', '🔒');
            }
        });
    </script>

</body>
</html>
