<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 경매 등록</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/account.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/items-new.css">
    <link rel="stylesheet" href="/css/modal.css">
    <script src="/js/modal.js"></script>
    <script src="/js/account.js" defer></script>
    <script src="/js/items-new.js" defer></script>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="account-section">
        <div class="account-container">

            <div th:replace="~{fragments/account-sidebar :: accountSidebar('items')}"></div>

            <section class="account-content">
                <div class="content-header">
                    <h2>경매 등록</h2>
                    <p>새로운 경매 물품을 등록하세요</p>
                </div>

                <div class="alert-error" th:if="${errorMessage != null}" th:text="${errorMessage}">
                    경매 등록 중 오류가 발생했습니다.
                </div>

                <form class="auction-form" action="/account/items/new" method="post" enctype="multipart/form-data">

                    <div class="form-section">
                        <h3 class="form-section-title">기본 정보</h3>

                        <div class="form-group">
                            <label for="title">경매 제목</label>
                            <input type="text" id="title" name="title" placeholder="경매에 등록할 물품의 제목을 입력하세요" required maxlength="100">
                            <span class="char-count"><span id="titleCount">0</span>/100</span>
                        </div>

                        <div class="form-group">
                            <label for="category">카테고리</label>
                            <select id="category" name="category" required>
                                <option value="" disabled selected>카테고리를 선택하세요</option>
                                <option value="digital">디지털/가전</option>
                                <option value="computer">컴퓨터/주변기기</option>
                                <option value="fashion">패션의류/잡화</option>
                                <option value="beauty">뷰티/미용</option>
                                <option value="furniture">가구/인테리어</option>
                                <option value="living">주방/생활용품</option>
                                <option value="sports">스포츠/레저</option>
                                <option value="books">도서/티켓/굿즈</option>
                                <option value="collectibles">컬렉터블/수집품</option>
                                <option value="hobby">악기/취미</option>
                                <option value="vehicle">차량/오토바이 용품</option>
                                <option value="etc">기타/반려동물</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="description">상품 설명</label>
                            <textarea id="description" name="description" rows="6" placeholder="물품의 상태, 구성품, 구매 시기 등 자세한 정보를 입력하세요" required maxlength="2000"></textarea>
                            <span class="char-count"><span id="descCount">0</span>/2000</span>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3 class="form-section-title">이미지 등록</h3>

                        <div class="form-group">
                            <div class="image-upload-area" id="imageUploadArea">
                                <div class="upload-placeholder">
                                    <span class="upload-icon">📷</span>
                                    <p>클릭 또는 드래그하여 이미지를 첨부하세요</p>
                                    <span class="upload-hint">최대 5장, 파일당 10MB 이하 (JPG, PNG)</span>
                                </div>
                                <input type="file" id="imageInput" name="images" multiple accept="image/jpeg, image/png" style="display: none;">
                            </div>
                            <div class="image-preview" id="imagePreview"></div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3 class="form-section-title">경매 설정</h3>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="startPrice">시작가</label>
                                <div class="input-with-suffix">
                                    <input type="number" id="startPrice" name="startPrice" placeholder="100,000" min="1000" required>
                                    <span class="input-suffix">원</span>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="buyNowPrice">즉시 구매가 <span class="optional">(선택)</span></label>
                                <div class="input-with-suffix">
                                    <input type="number" id="buyNowPrice" name="buyNowPrice" placeholder="미입력 시 일반 경매" min="0">
                                    <span class="input-suffix">원</span>
                                </div>
                                <p class="form-hint">비워두면 경매 종료 시 가장 높은 입찰자가 낙찰받는 일반 경매로 진행됩니다.</p>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="bidUnit">최소 입찰 단위</label>
                                <div class="input-with-suffix">
                                    <input type="number" id="bidUnit" name="bidUnit" placeholder="10,000" min="1000" required>
                                    <span class="input-suffix">원</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="startTime">경매 시작 시간</label>
                                <input type="datetime-local" id="startTime" name="startTime" required>
                                <p class="form-hint">기본값은 현재 시간으로 설정됩니다. 공개 시간을 예약하려면 원하는 날짜와 시간을 직접 지정하세요.</p>
                            </div>

                            <div class="form-group">
                                <label for="endTime">경매 종료 시간</label>
                                <input type="datetime-local" id="endTime" name="endTime" required>
                                <p class="form-hint">기본값은 7일 후 낮 12시로 설정됩니다. 원하는 종료 시간으로 변경할 수 있습니다.</p>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="/account/items" class="btn-cancel">취소</a>
                        <button type="submit" class="btn-submit">경매 등록</button>
                    </div>
                </form>
            </section>

        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
