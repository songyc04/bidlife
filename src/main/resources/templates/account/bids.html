<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 내 입찰 내역</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/account.css">
    <link rel="stylesheet" href="/css/bids.css">
    <script src="/js/bids.js" defer></script>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">BID<span>LIFE</span></a>
            <nav class="nav-menu">
                <a href="/items" class="nav-link">경매 둘러보기</a>
                <a href="/account/items/new" class="nav-link btn-create">경매 등록</a>
            </nav>
            <div class="nav-auth">
                <a href="/account" class="btn-mypage">마이페이지</a>
                <a href="/login/logout" class="btn-logout">로그아웃</a>
            </div>
        </div>
    </header>

    <main class="account-section">
        <div class="account-container">

            <aside class="account-sidebar">
                <div class="sidebar-header">
                    <div class="profile-icon" th:attr="data-seed=${nickname}">
                        <img th:if="${profileImage != null and !profileImage.isEmpty()}" 
                             th:src="${profileImage}" 
                             th:alt="${nickname}" 
                             class="profile-img">
                        <span th:if="${profileImage == null or profileImage.isEmpty()}" 
                              th:text="${nickname != null ? nickname.substring(0,1) : '?'}">U</span>
                    </div>
                    <h3 th:text="${nickname}">닉네임</h3>
                </div>
                <nav class="sidebar-menu">
                    <a href="/account" class="menu-item">
                        <span class="menu-icon">👤</span>
                        <span>내 정보</span>
                    </a>
                    <a href="/account/notifications" class="menu-item">
                        <span class="menu-icon">🔔</span>
                        <span>알림</span>
                    </a>
                    <a href="/account/bids" class="menu-item active">
                        <span class="menu-icon">💰</span>
                        <span>내 입찰 내역</span>
                    </a>
                    <a href="/account/items" class="menu-item">
                        <span class="menu-icon">📦</span>
                        <span>등록한 경매</span>
                    </a>
                    <a href="/account/picklist" class="menu-item">
                        <span class="menu-icon">⭐</span>
                        <span>찜한 경매</span>
                    </a>
                </nav>
            </aside>

            <section class="account-content">
                <div class="content-header">
                    <h2>내 입찰 내역</h2>
                    <p>참여한 입찰 기록을 확인하세요</p>
                </div>

                <div class="bid-list" th:if="${bidDetails != null and !bidDetails.isEmpty()}">
                    <div class="bid-card" th:each="detail : ${bidDetails}"
                         th:attr="data-status=${detail.bid.status == 'active' ? 'bidding' : (detail.bid.status == 'outbid' ? 'lost' : 'won')}">
                        <div class="bid-thumb">
                            <span class="status-badge" 
                                  th:classappend="${detail.item.status == 'bidding'} ? 'bidding' : ((detail.item.status == 'upcoming') ? 'upcoming' : 'ended')"
                                  th:text="${detail.item.status == 'bidding'} ? 'LIVE' : ((detail.item.status == 'upcoming') ? 'UPCOMING' : 'ENDED')">LIVE</span>
                            <div th:if="${detail.item.imagePaths != null and !detail.item.imagePaths.isEmpty()}" class="card-image">
                                <img th:src="${detail.item.imagePaths.split(',')[0]}" th:alt="${detail.item.title}">
                            </div>
                            <div th:unless="${detail.item.imagePaths != null and !detail.item.imagePaths.isEmpty()}" class="dummy-img">📦</div>
                        </div>
                        <div class="bid-info">
                            <h3 th:text="${detail.item.title}">경매 제목</h3>
                            <div class="bid-meta">
                                <div class="meta-item">
                                    <span class="meta-label">내 입찰가</span>
                                    <span class="meta-value my-bid" th:text="${#numbers.formatInteger(detail.bid.bidAmount, 3, 'COMMA')} + '원'">0원</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">현재 최고가</span>
                                    <span class="meta-value current-bid" th:text="${#numbers.formatInteger(detail.item.currentPrice != null ? detail.item.currentPrice : detail.item.startPrice, 3, 'COMMA')} + '원'">0원</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">입찰 일시</span>
                                    <span class="meta-value" th:text="${#temporals.format(detail.bid.createdAt, 'yyyy.MM.dd HH:mm')}">2026.01.01 12:00</span>
                                </div>
                            </div>
                        </div>
                        <div class="bid-action">
                            <span class="bid-status" 
                                  th:classappend="${detail.bid.status == 'active' ? 'bidding' : 'lost'}"
                                  th:text="${detail.bid.status == 'active' ? '입찰 중' : '낙찰 실패'}">입찰 중</span>
                            <a th:href="'/items/' + ${detail.item.id}" class="btn-detail">상세보기</a>
                        </div>
                    </div>
                </div>

                <div class="empty-state" th:if="${bidDetails == null || bidDetails.isEmpty()}">
                    <div class="empty-icon">💰</div>
                    <h3>아직 입찰 내역이 없습니다</h3>
                    <p>관심 있는 경매에 참여해보세요!</p>
                    <a href="/items" class="btn-go-items">경매 둘러보기</a>
                </div>
            </section>

        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 BIDLIFE. All rights reserved. 폴리텍 기말 과제 프로젝트</p>
    </footer>

</body>
</html>
