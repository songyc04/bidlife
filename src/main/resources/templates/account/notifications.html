<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 알림</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/account.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/modal.css">
    <script src="/js/modal.js"></script>
    <script src="/js/account.js" defer></script>
    
    <link rel="stylesheet" href="/css/responsive.css">`n    <link rel="stylesheet" href="/css/notifications.css">

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="account-section">
        <div class="account-container">

            <div th:replace="~{fragments/account-sidebar :: accountSidebar('notifications')}"></div>

            <section class="account-content">
                <div class="content-header">
                    <h2>알림</h2>
                    <p>경매 관련 알림을 확인하세요</p>
                </div>

                <div class="notification-header" th:if="${notifications != null and !notifications.isEmpty()}">
                    <span style="color: #888; font-size: 14px;">
                        총 <span th:text="${notifications.size()}">0</span>개의 알림
                        <span th:if="${unreadCount > 0}" style="color: #ff5a00;">
                            (읽지 않음 <span th:text="${unreadCount}">0</span>개)
                        </span>
                    </span>
                    <div class="notification-actions-top">
                        <form action="/account/notifications/read-all" method="post" th:if="${unreadCount > 0}" style="display: inline-block; margin-right: 8px;">
                            <button type="submit" class="btn-read-all">모두 읽음 처리</button>
                        </form>
                        <form action="/account/notifications/delete-read" method="post" id="deleteReadForm" style="display: inline-block;">
                            <button type="submit" class="btn-delete-read">🗑️ 읽은 알림 삭제</button>
                        </form>
                    </div>
                </div>

                <div class="notification-list" th:if="${notifications != null and !notifications.isEmpty()}">
                    <div class="notification-item" 
                         th:each="notification : ${notifications}"
                         th:classappend="${!notification.isRead} ? 'unread'">
                        <div class="notification-icon" th:classappend="${notification.type}">
                            <span th:switch="${notification.type}">
                                <span th:case="'new_bid'">💰</span>
                                <span th:case="'auction_won'">🎉</span>
                                <span th:case="'auction_lost'">😢</span>
                                <span th:case="'auction_seller_won'">📦</span>
                                <span th:case="'auction_failed'">📭</span>
                                <span th:case="'buy_now_complete'">💳</span>
                                <span th:case="'buy_now_ended'">⚡</span>
                                <span th:case="'payment_buyer_paid'">💰</span>
                                <span th:case="'payment_pending_seller'">⏳</span>
                                <span th:case="'transaction_completed'">🎉</span>
                                <span th:case="*">🔔</span>
                            </span>
                        </div>
                        <div class="notification-body">
                            <p class="notification-message" th:text="${notification.message}">알림 메시지</p>
                            <div class="notification-meta">
                                <span class="notification-time" 
                                      th:text="${#temporals.format(notification.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</span>
                                <a th:if="${notification.itemId != null}"
                                   th:href="${notificationLinks != null and notificationLinks.containsKey(notification.id)} ? ${notificationLinks.get(notification.id)} : '/items/' + ${notification.itemId}"
                                   class="notification-link"
                                   th:text="${notification.type == 'auction_seller_won' or notification.type == 'auction_failed' or notification.type == 'new_bid' or notification.type == 'payment_buyer_paid'} ? '관리 페이지로' : (${notification.type == 'auction_won' or notification.type == 'buy_now_complete' or notification.type == 'payment_pending_seller'} ? '결제하러 가기' : (${notification.type == 'transaction_completed'} ? '거래 내역 보기' : '경매 보기'))">경매 보기</a>
                            </div>
                        </div>
                        <div class="notification-actions">
                            <form th:if="${!notification.isRead}"
                                  th:action="'/account/notifications/' + ${notification.id} + '/read'" method="post"
                                  style="display: inline-block; margin-right: 6px;">
                                <button type="submit" class="btn-mark-read">읽음</button>
                            </form>
                            <form th:action="'/account/notifications/' + ${notification.id} + '/delete'" method="post"
                                  class="delete-notification-form" style="display: inline-block;">
                                <button type="submit" class="btn-delete-notification" title="삭제">🗑️</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="empty-notifications" th:if="${notifications == null || notifications.isEmpty()}">
                    <div class="empty-notifications-icon">🔔</div>
                    <h3>알림이 없습니다</h3>
                    <p>새로운 입찰이 발생하면 여기에 알림이 표시됩니다</p>
                </div>
            </section>

        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        const deleteReadForm = document.getElementById('deleteReadForm');
        if (deleteReadForm) {
            deleteReadForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const form = this;
                showConfirm('🗑️ 읽은 알림을 모두 삭제하시겠습니까?<br><br><span style="color: #ff6666; font-size: 13px;">⚠️ 읽지 않은 알림은 삭제되지 않으며, 삭제된 알림은 복구할 수 없습니다.</span>', function() {
                    form.submit();
                });
            });
        }

        document.querySelectorAll('.delete-notification-form').forEach(form => {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const target = this;
                showConfirm('이 알림을 삭제하시겠습니까?', function() {
                    target.submit();
                });
            });
        });
    </script>

</body>
</html>
