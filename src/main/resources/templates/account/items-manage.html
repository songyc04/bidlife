<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDLIFE | 경매 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/account.css">
    <link rel="stylesheet" href="/css/items-manage.css">
    <link rel="stylesheet" href="/css/modal.css">
    <script src="/js/modal.js"></script>
    <script src="/js/account.js" defer></script>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="account-section">
        <div class="account-container">

            <div th:replace="~{fragments/account-sidebar :: accountSidebar('items')}"></div>

            <section class="account-content">
                <div class="content-header">
                    <div class="content-header-top">
                        <div>
                            <h2>경매 관리</h2>
                            <p>내 경매를 관리하세요</p>
                        </div>
                        <a href="/account/items" class="btn-back">← 목록으로</a>
                    </div>
                </div>

                <div class="alert-success" th:if="${successMessage != null}" th:text="${successMessage}">
                    성공적으로 처리되었습니다.
                </div>

                <div class="alert-error" th:if="${errorMessage != null}" th:text="${errorMessage}">
                    오류가 발생했습니다.
                </div>

                <div class="manage-layout">
                    <div class="manage-preview">
                        <div class="preview-image">
                            <span class="status-badge" th:classappend="${item.status}"
                                  th:text="${item.status == 'bidding'} ? 'LIVE' : (${item.status == 'upcoming'} ? 'UPCOMING' : 'ENDED')">LIVE</span>
                            <div th:if="${item.imagePaths != null and !item.imagePaths.isEmpty()}" class="card-image">
                                <img th:src="${item.imagePaths.split(',')[0].startsWith('/') ? item.imagePaths.split(',')[0] : '/' + item.imagePaths.split(',')[0]}" th:alt="${item.title}">
                            </div>
                            <div th:unless="${item.imagePaths != null and !item.imagePaths.isEmpty()}" class="dummy-img">📦</div>
                        </div>
                        <div class="preview-info">
                            <h3 th:text="${item.title}">경매 제목</h3>
                            <div class="preview-stats">
                                <div class="stat-row">
                                    <span class="stat-label">시작가</span>
                                    <span class="stat-value" th:text="${#numbers.formatInteger(item.startPrice, 3, 'COMMA')} + '원'">0원</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">현재가</span>
                                    <span class="stat-value highlight" th:text="${#numbers.formatInteger(item.currentPrice != null ? item.currentPrice : item.startPrice, 3, 'COMMA')} + '원'">0원</span>
                                </div>
                                <div class="stat-row" th:if="${item.buyNowPrice != null}">
                                    <span class="stat-label">즉시구매가</span>
                                    <span class="stat-value" th:text="${#numbers.formatInteger(item.buyNowPrice, 3, 'COMMA')} + '원'">0원</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">입찰단위</span>
                                    <span class="stat-value" th:text="${#numbers.formatInteger(item.bidUnit, 3, 'COMMA')} + '원'">0원</span>
                                </div>
                            </div>
                            <div class="preview-time">
                                <div class="time-row">
                                    <span class="time-label">시작</span>
                                    <span class="time-value" th:text="${#temporals.format(item.startTime, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</span>
                                </div>
                                <div class="time-row">
                                    <span class="time-label">종료</span>
                                    <span class="time-value" th:text="${#temporals.format(item.endTime, 'yyyy-MM-dd HH:mm')}">2026-01-08 12:00</span>
                                </div>
                                <div class="time-row" th:if="${item.status == 'bidding'}">
                                    <span class="time-label">남은 시간</span>
                                    <span class="time-value countdown" th:attr="data-time=${item.endTime}">00:00:00</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="manage-actions">
                        <div class="action-card">
                            <h4>경매 관리</h4>
                            <div class="action-buttons">
                                <a th:href="'/items/' + ${item.id}" class="btn-action btn-view">
                                    <span class="btn-icon">👁️</span>
                                    <span>상세보기</span>
                                </a>
                                <form th:action="'/account/items/' + ${item.id} + '/end'" method="post" 
                                      th:if="${item.status != 'ended'}"
                                      class="confirm-form"
                                      data-confirm-message="경매를 조기 종료하시겠습니까? 이 작업은 되돌릴 수 없습니다.">
                                    <button type="submit" class="btn-action btn-end">
                                        <span class="btn-icon">⏹️</span>
                                        <span>조기 종료</span>
                                    </button>
                                </form>
                                <form th:action="'/account/items/' + ${item.id} + '/delete'" method="post"
                                      class="confirm-form"
                                      data-confirm-message="정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.">
                                    <button type="submit" class="btn-action btn-delete">
                                        <span class="btn-icon">🗑️</span>
                                        <span>삭제</span>
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div class="action-card" th:if="${item.status == 'ended'}">
                            <h4>경매 결과</h4>
                            <p class="info-text">이 경매는 종료되었습니다.</p>
                            <a th:href="'/items/' + ${item.id}" class="btn-action btn-view">
                                <span class="btn-icon">📊</span>
                                <span>결과 확인하기</span>
                            </a>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        // 확인 폼 처리
        document.querySelectorAll('.confirm-form').forEach(form => {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const message = this.dataset.confirmMessage;
                const formToSubmit = this;
                
                showConfirm(message, function() {
                    formToSubmit.submit();
                });
            });
        });

        function updateCountdowns() {
            const countdowns = document.querySelectorAll('.countdown');
            countdowns.forEach(el => {
                const targetTime = new Date(el.dataset.time).getTime();
                const now = new Date().getTime();
                const diff = targetTime - now;

                if (diff <= 0) {
                    el.textContent = '종료';
                    el.classList.add('ended');
                    return;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                if (days > 0) {
                    el.textContent = `${days}일 ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                } else {
                    el.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }
            });
        }

        updateCountdowns();
        setInterval(updateCountdowns, 1000);
    </script>

</body>
</html>
